spring.application.name=backend
server.port=8080

# DATABASE
spring.datasource.url=jdbc:postgresql://localhost:5434/QLSV_db
spring.datasource.username=QLSV_user
spring.datasource.password=QLSV_password
spring.datasource.driver-class-name=org.postgresql.Driver

# FLYWAY
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.defer-datasource-initialization=false
spring.jpa.open-in-view=false

# REDIS
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2s

# REGISTRATION LOCK
app.registration-lock.ttl-ms=${APP_REGISTRATION_LOCK_TTL_MS:10000}
app.registration-lock.wait-timeout-ms=${APP_REGISTRATION_LOCK_WAIT_TIMEOUT_MS:3000}
app.registration-lock.retry-interval-ms=${APP_REGISTRATION_LOCK_RETRY_INTERVAL_MS:100}

# JWT
jwt.secret=DayLaMotChuoiBiMatCuaDuAnQLSV2026!@#

# ADMIN
spring.config.import=optional:file:backend/.env[.properties]
app.admin.username=${APP_ADMIN_USERNAME:}
app.admin.email=${APP_ADMIN_EMAIL:}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.admin.full-name=${APP_ADMIN_FULL_NAME:Admin}
