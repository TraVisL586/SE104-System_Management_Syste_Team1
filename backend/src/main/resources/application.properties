spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.application.name=${APP_NAME}
server.port=${SERVER_PORT}

# DATABASE
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

# FLYWAY
spring.flyway.enabled=${FLYWAY_ENABLED}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE}
spring.flyway.locations=${FLYWAY_LOCATIONS}

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.defer-datasource-initialization=${JPA_DEFER_DATASOURCE_INITIALIZATION}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW}

# REDIS
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.timeout=${REDIS_TIMEOUT}

# REGISTRATION LOCK
app.registration-lock.ttl-ms=${APP_REGISTRATION_LOCK_TTL_MS}
app.registration-lock.wait-timeout-ms=${APP_REGISTRATION_LOCK_WAIT_TIMEOUT_MS}
app.registration-lock.retry-interval-ms=${APP_REGISTRATION_LOCK_RETRY_INTERVAL_MS}

# JWT
jwt.secret=${JWT_SECRET}

# ADMIN
app.admin.username=${APP_ADMIN_USERNAME}
app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}
app.admin.full-name=${APP_ADMIN_FULL_NAME}